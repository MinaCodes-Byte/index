<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EID Vault</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#B76E5F">
<link rel="icon" href="Favicon.png">

<style>
body {
    margin: 0;
    background: url(https://i.pinimg.com/1200x/2c/6f/48/2c6f48ccb84e36748cc5e63129b64111.jpg);
    background-size: cover;
    background-position: center;
    color: #FFD700;
    font-family: 'Courier New', monospace;

    display: flex;
    justify-content: center;
    align-items: center;

    min-height: 100vh;
    padding: 20px;
}

/* Container */
.terminal-box {
    width: 100%;
    max-width: 400px;
    padding: 20px;
    background: rgba(0,0,0,0.7);
    border-radius: 15px;
    text-align: center;
}

/* Input (SMALLER) */
input {
    width: 70%;
    padding: 10px;
    font-size: 0.9rem;
    border-radius: 10px;
    border: none;
    display: block;
    margin: 10px auto;
    text-align: center;
}

/* Button */
#sync-btn {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border-radius: 12px;
    border: none;
    background: #B76E5F;
    color: white;
    font-size: 1rem;
}

/* BIGGER TEXT */
h1 { font-size: 1.6rem; }
h2 { font-size: 1.3rem; }
h3 { font-size: 1.1rem; }
p { font-size: 1rem; }

/* Overlay */
#jumpscare-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    background: BLACK;
    z-index: 999;
}

#ghost-emoji {
    font-size: 8rem;
}

.blood-text {
    color: red;
    font-size: 2rem;
    margin-top: 20px;
    text-align: center;
}

/* Scan */
#scan-overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: BLACK;
    color: red;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 998;
    font-size: 1.5rem;
}

.scan-line {
    width: 80%;
    height: 2px;
    background: red;
    position: absolute;
    top: 0;
    animation: scanMove 2s linear infinite;
}

@keyframes scanMove {
    0% { top: 0; }
    100% { top: 100%; }
}
</style>
</head>

<body>

<audio id="scream" src="https://www.myinstants.com/media/sounds/chipmunk-laugh.mp3"></audio>
<audio id="creepy" src="https://www.fesliyanstudios.com/play-mp3/6673"></audio>

<div class="terminal-box" id="setup">
    <h1>EID REWARD SYSTEM</h1>
	<h2>LETS SEE HOW LUCKY ARE YOU</h2>
    <h3>Enter your name</h3>
    <input id="name">
    <button id="sync-btn" onclick="start()">VERIFY</button>
</div>

<div class="terminal-box" id="game" style="display:none;">
    <h2 id="msg"></h2>
    <button id="sync-btn" onclick="tap()">Sync</button>
    <p id="progress">0%</p>
</div>

<div id="scan-overlay">
    <div class="scan-line"></div>
    <p id="scan-text">Scanning...</p>
</div>

<div id="jumpscare-overlay">
    <div id="ghost-emoji">👹</div>
    <div class="blood-text">HAHA GOT YOU 😈 EIDI DEPOSITED... OOPS, THAT WASN'T CASH! 💨 HAHAHAH😂</div>
</div>

<script>
let taps = 0;
let name = "";

/* RANDOM EMOJIS 😈 */
const emojis = ["👹","💀","👻","😈","🩸","👁","☠️"];

function start() {
    name = document.getElementById("name").value;
    if (!name) return alert("Enter name!");

    document.getElementById("setup").style.display = "none";
    document.getElementById("game").style.display = "block";
    document.getElementById("msg").innerText = "TARGET: " + name;
}

function tap() {
    taps++;
    document.getElementById("progress").innerText = (taps * 20) + "%";

    if (taps >= 5) trigger();
}

function trigger() {
    const scan = document.getElementById("scan-overlay");
    const scare = document.getElementById("jumpscare-overlay");
    const emojiBox = document.getElementById("ghost-emoji");

    scan.style.display = "flex";
    document.getElementById("creepy").play();

    let lines = [
        "Scanning face...",
        "Identifying...",
        "ACCESSING CAMERA...",
        "WE ARE WATCHING YOU 👁",
        "RUN 😈"
    ];

    let i = 0;

    const interval = setInterval(() => {
        document.getElementById("scan-text").innerText = lines[i];
        i++;

        if (i === lines.length) {
            clearInterval(interval);

            scan.style.display = "none";
            scare.style.display = "flex";

            /* RANDOM EMOJI + VIBRATION */
            emojiBox.innerText = emojis[Math.floor(Math.random() * emojis.length)];

            document.getElementById("scream").play();

            if (navigator.vibrate) {
                navigator.vibrate([300,100,300,100,500,200,700]);
            }

            setTimeout(() => location.reload(), 6000);
        }
    }, 1200);
}

/* PWA */
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
</html>
